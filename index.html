<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexus IA - Resumidor Inteligente</title>
    <!-- Firebase SDKs (usando a tag script, mais simples) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0F1F;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: #111827;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 0 1px rgba(162,89,255,0.2);
            transition: all 0.2s;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #A259FF, #00E5FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #9CA3AF;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .credits-card {
            background: #1F2937;
            border-radius: 60px;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
            color: #00E5FF;
            border: 1px solid #374151;
        }
        textarea {
            width: 100%;
            padding: 16px;
            border-radius: 24px;
            border: 1px solid #374151;
            background: #1F2937;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 16px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #A259FF;
            box-shadow: 0 0 0 2px rgba(162,89,255,0.3);
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }
        button {
            background: #A259FF;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background: #7C3AED; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        .btn-secondary {
            background: #374151;
        }
        .btn-secondary:hover { background: #4B5563; }
        .result-box {
            background: #0F172A;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #A259FF;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .action-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        .action-icons button {
            background: #1F2937;
            padding: 8px 16px;
            font-size: 0.8rem;
        }
        .recharge-area {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .recharge-area input {
            flex: 2;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #374151;
            background: #1F2937;
            color: white;
        }
        .logout-btn {
            background: #EF4444;
            margin-top: 16px;
            width: 100%;
        }
        #loginArea {
            text-align: center;
            padding: 30px 0;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4B5563;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>⚡ NEXUS IA</h1>
    <div class="sub">inteligência para estudantes</div>

    <!-- Área de login -->
    <div id="loginArea">
        <button id="googleLoginBtn" style="background:#ffffff; color:#0A0F1F;">🔐 Entrar com Google</button>
    </div>

    <!-- Área principal (só aparece após login) -->
    <div id="mainApp" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div class="credits-card">🎫 Créditos restantes: <span id="creditsCount">0</span></div>
            <span id="userName" style="color:#9CA3AF;"></span>
        </div>

        <textarea id="inputText" rows="6" placeholder="Cole aqui seu texto (artigo, aula, capítulo, tema para apresentação)...&#10;Exemplo: texto sobre Revolução Francesa, ou 'Explique derivadas parciais'"></textarea>

        <div class="button-group">
            <button id="summarizeBtn">✨ Resumir (1 crédito)</button>
            <button id="presentationBtn" class="btn-secondary">📊 Preparar Apresentação</button>
        </div>

        <div id="outputArea" style="display:none;">
            <div class="result-box" id="resultText"></div>
            <div class="action-icons" id="actionButtons">
                <button id="speakBtn">🔊 Ouvir</button>
                <button id="copyBtn">📋 Copiar</button>
                <button id="feedbackBtn">👍 Útil / Feedback</button>
            </div>
        </div>

        <div class="recharge-area">
            <input type="text" id="rechargeCode" placeholder="Código de recarga" autocomplete="off">
            <button id="rechargeBtn">Recarregar +20 créditos</button>
        </div>

        <button id="logoutBtn" class="logout-btn">🚪 Sair</button>
    </div>
    <footer>Nexus IA • resumos • apresentações • feedback • sempre aprendendo</footer>
</div>

<script>
    // ------------------------------------------------
    // 1. SUAS CONFIGURAÇÕES DO FIREBASE (já inseridas)
    // ------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyAAMpRiTcUmBGgR_yjMW2Qb2CCBgFPrSGY",
        authDomain: "nexos-ia-edy-8bb39.firebaseapp.com",
        projectId: "nexos-ia-edy-8bb39",
        storageBucket: "nexos-ia-edy-8bb39.firebasestorage.app",
        messagingSenderId: "288031987641",
        appId: "1:288031987641:web:37c277451a3ced6d8b4868"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ------------------------------------------------
    // 2. SUA CHAVE DA API GEMINI (grátis)
    // ------------------------------------------------
    const GEMINI_API_KEY = "AIzaSyDy4cTB0SY3FviBsUzt9lE8ouuKWxoz6n0";

    // ------------------------------------------------
    // 3. ELEMENTOS DA TELA
    // ------------------------------------------------
    const loginArea = document.getElementById('loginArea');
    const mainApp = document.getElementById('mainApp');
    const creditsSpan = document.getElementById('creditsCount');
    const userNameSpan = document.getElementById('userName');
    const inputText = document.getElementById('inputText');
    const outputArea = document.getElementById('outputArea');
    const resultTextDiv = document.getElementById('resultText');
    let currentResult = '';       // guarda o último texto gerado
    let currentUserObj = null;

    // ------------------------------------------------
    // 4. FUNÇÕES DE CRÉDITOS (Firestore)
    // ------------------------------------------------
    async function getCredits(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) return doc.data().credits || 0;
        else return 20; // primeiro acesso
    }

    async function setCredits(uid, newAmount) {
        await db.collection('users').doc(uid).set({ credits: newAmount }, { merge: true });
        creditsSpan.innerText = newAmount;
    }

    async function spendCredit(uid) {
        let current = await getCredits(uid);
        if (current <= 0) {
            alert('❌ Créditos insuficientes! Use o código SYNAP2024 (ou o que o criador definir) na área de recarga.');
            return false;
        }
        await setCredits(uid, current - 1);
        return true;
    }

    // ------------------------------------------------
    // 5. CHAMADA GEMINI (resumir / apresentação)
    // ------------------------------------------------
    async function callGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates[0].content.parts[0].text;
    }

    async function handleSummarize() {
        const text = inputText.value.trim();
        if (!text) return alert('📌 Digite ou cole um texto primeiro.');
        const uid = currentUserObj.uid;
        const hasCredit = await spendCredit(uid);
        if (!hasCredit) return;

        outputArea.style.display = 'block';
        resultTextDiv.innerText = '⏳ Gerando resumo inteligente...';
        currentResult = '';
        try {
            const prompt = `Você é o Nexus IA, um assistente de estudos. Resuma o seguinte texto acadêmico de forma clara, destacando os pontos principais, conceitos-chave e conclusão. Texto: ${text}`;
            const summary = await callGemini(prompt);
            currentResult = summary;
            resultTextDiv.innerText = summary;
        } catch (err) {
            resultTextDiv.innerText = '❌ Erro: ' + err.message;
        }
    }

    async function handlePresentation() {
        const text = inputText.value.trim();
        if (!text) return alert('📌 Digite o tema da sua apresentação ou cole um texto.');
        const uid = currentUserObj.uid;
        const hasCredit = await spendCredit(uid);
        if (!hasCredit) return;

        outputArea.style.display = 'block';
        resultTextDiv.innerText = '⏳ Preparando dicas para sua apresentação...';
        currentResult = '';
        try {
            const prompt = `Com base no seguinte tema/conteúdo: "${text}". Gere um roteiro para apresentação incluindo:
1) 5 possíveis perguntas que a plateia pode fazer.
2) 3 termos difíceis (ou fórmulas) com definições simples para esclarecer o público.
Seja direto e útil para o estudante.`;
            const result = await callGemini(prompt);
            currentResult = result;
            resultTextDiv.innerText = result;
        } catch (err) {
            resultTextDiv.innerText = '❌ Erro: ' + err.message;
        }
    }

    // ------------------------------------------------
    // 6. Ações pós-resultado (áudio, copiar, feedback)
    // ------------------------------------------------
    function speakResult() {
        if (!currentResult) return;
        const utterance = new SpeechSynthesisUtterance(currentResult);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
    }

    function copyResult() {
        if (!currentResult) return;
        navigator.clipboard.writeText(currentResult);
        alert('✅ Conteúdo copiado para a área de transferência!');
    }

    async function sendFeedback() {
        if (!currentResult) return;
        const uid = currentUserObj.uid;
        await db.collection('feedbacks').add({
            userId: uid,
            textGerado: currentResult,
            inputOriginal: inputText.value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('🙏 Obrigado! Seu feedback ajuda o Nexus IA a evoluir.');
    }

    // ------------------------------------------------
    // 7. Recarga de créditos (código padrão)
    // ------------------------------------------------
    async function rechargeCredits() {
        const code = document.getElementById('rechargeCode').value.trim();
        if (code === 'SYNAP2024') {   // código padrão (você pode mudar depois pelo painel de criador)
            const uid = currentUserObj.uid;
            let current = await getCredits(uid);
            await setCredits(uid, current + 20);
            alert('🎉 +20 créditos adicionados!');
            document.getElementById('rechargeCode').value = '';
        } else {
            alert('❌ Código inválido. Use "SYNAP2024" (padrão).');
        }
    }

    // ------------------------------------------------
    // 8. Logout
    // ------------------------------------------------
    async function logout() {
        await auth.signOut();
        loginArea.style.display = 'block';
        mainApp.style.display = 'none';
        currentUserObj = null;
    }

    // ------------------------------------------------
    // 9. Gerenciar estado de autenticação (login)
    // ------------------------------------------------
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUserObj = user;
            // Garantir documento do usuário no Firestore
            const userRef = db.collection('users').doc(user.uid);
            const docSnap = await userRef.get();
            if (!docSnap.exists) {
                await userRef.set({
                    name: user.displayName,
                    email: user.email,
                    credits: 20,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            const credits = await getCredits(user.uid);
            creditsSpan.innerText = credits;
            userNameSpan.innerText = `👋 ${user.displayName?.split(' ')[0] || 'Estudante'}`;
            loginArea.style.display = 'none';
            mainApp.style.display = 'block';
            outputArea.style.display = 'none';
            inputText.value = '';
        } else {
            loginArea.style.display = 'block';
            mainApp.style.display = 'none';
            currentUserObj = null;
        }
    });

    // ------------------------------------------------
    // 10. Eventos dos botões
    // ------------------------------------------------
    document.getElementById('googleLoginBtn').onclick = () => auth.signInWithPopup(provider);
    document.getElementById('summarizeBtn').onclick = handleSummarize;
    document.getElementById('presentationBtn').onclick = handlePresentation;
    document.getElementById('speakBtn').onclick = speakResult;
    document.getElementById('copyBtn').onclick = copyResult;
    document.getElementById('feedbackBtn').onclick = sendFeedback;
    document.getElementById('rechargeBtn').onclick = rechargeCredits;
    document.getElementById('logoutBtn').onclick = logout;
</script>
</body>
  </html>
