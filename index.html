<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexus IA - Resumidor Inteligente</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0F1F;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: #111827;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 0 1px rgba(162,89,255,0.2);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #A259FF, #00E5FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub { text-align: center; color: #9CA3AF; margin-bottom: 24px; font-size: 0.9rem; }
        .credits-card {
            background: #1F2937;
            border-radius: 60px;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
            color: #00E5FF;
        }
        textarea {
            width: 100%;
            padding: 16px;
            border-radius: 24px;
            border: 1px solid #374151;
            background: #1F2937;
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }
        button {
            background: #A259FF;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #7C3AED; transform: scale(1.02); }
        .btn-secondary { background: #374151; }
        .result-box {
            background: #0F172A;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #A259FF;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .action-icons { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .recharge-area { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .recharge-area input { flex: 2; padding: 10px; border-radius: 40px; background: #1F2937; color: white; border: 1px solid #374151; }
        .logout-btn { background: #EF4444; margin-top: 16px; width: 100%; }
        #loginArea { text-align: center; padding: 30px 0; }
        footer { text-align: center; font-size: 0.7rem; color: #4B5563; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>⚡ NEXUS IA</h1>
    <div class="sub">inteligência para estudantes</div>
    <div id="loginArea">
        <button id="googleLoginBtn" style="background:#ffffff; color:#0A0F1F;">🔐 Entrar com Google</button>
    </div>
    <div id="mainApp" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div class="credits-card">🎫 Créditos restantes: <span id="creditsCount">0</span></div>
            <span id="userName" style="color:#9CA3AF;"></span>
        </div>
        <textarea id="inputText" rows="6" placeholder="Cole seu texto (artigo, aula, tema para apresentação)..."></textarea>
        <div class="button-group">
            <button id="summarizeBtn">✨ Resumir (1 crédito)</button>
            <button id="presentationBtn" class="btn-secondary">📊 Preparar Apresentação</button>
        </div>
        <div id="outputArea" style="display:none;">
            <div class="result-box" id="resultText"></div>
            <div class="action-icons">
                <button id="speakBtn">🔊 Ouvir</button>
                <button id="copyBtn">📋 Copiar</button>
                <button id="feedbackBtn">👍 Útil / Feedback</button>
            </div>
        </div>
        <div class="recharge-area">
            <input type="text" id="rechargeCode" placeholder="Código de recarga">
            <button id="rechargeBtn">Recarregar +20 créditos</button>
        </div>
        <button id="logoutBtn" class="logout-btn">🚪 Sair</button>
    </div>
    <footer>Nexus IA • resumos • apresentações • feedback • sempre aprendendo</footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAAMpRiTcUmBGgR_yjMW2Qb2CCBgFPrSGY",
        authDomain: "nexos-ia-edy-8bb39.firebaseapp.com",
        projectId: "nexos-ia-edy-8bb39",
        storageBucket: "nexos-ia-edy-8bb39.firebasestorage.app",
        messagingSenderId: "288031987641",
        appId: "1:288031987641:web:37c277451a3ced6d8b4868"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ⭐ A CHAVE AGORA É LIDA DA VARIÁVEL DE AMBIENTE (NÃO FICA MAIS NO CÓDIGO)
    const OPENROUTER_API_KEY = process.env.OPENROUTER_API_KEY;

    async function callOpenRouter(prompt) {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                "Content-Type": "application/json",
                "HTTP-Referer": "https://nexus-ia-lovat.vercel.app",
                "X-Title": "Nexus IA"
            },
            body: JSON.stringify({
                "model": "google/gemini-2.0-flash-lite-001",
                "messages": [{ "role": "user", "content": prompt }]
            })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        return data.choices[0].message.content;
    }

    async function getCredits(uid) {
        const doc = await db.collection('users').doc(uid).get();
        return doc.exists ? doc.data().credits : 20;
    }
    async function setCredits(uid, amount) {
        await db.collection('users').doc(uid).set({ credits: amount }, { merge: true });
        document.getElementById('creditsCount').innerText = amount;
    }
    async function spendCredit(uid) {
        let current = await getCredits(uid);
        if (current <= 0) { alert('❌ Créditos insuficientes!'); return false; }
        await setCredits(uid, current - 1);
        return true;
    }

    let currentResult = "";

    async function handleSummarize() {
        const text = document.getElementById('inputText').value.trim();
        if (!text) return alert('📌 Digite ou cole um texto.');
        const user = auth.currentUser;
        if (!user) return;
        if (!await spendCredit(user.uid)) return;
        const outputDiv = document.getElementById('resultText');
        document.getElementById('outputArea').style.display = 'block';
        outputDiv.innerText = '⏳ Gerando resumo...';
        try {
            const prompt = `Resuma o texto abaixo de forma clara, destacando os pontos principais:\n\n${text}`;
            const summary = await callOpenRouter(prompt);
            outputDiv.innerText = summary;
            currentResult = summary;
        } catch(e) {
            outputDiv.innerText = '❌ Erro: ' + e.message;
        }
    }

    async function handlePresentation() {
        const text = document.getElementById('inputText').value.trim();
        if (!text) return alert('📌 Digite o tema da apresentação.');
        const user = auth.currentUser;
        if (!user) return;
        if (!await spendCredit(user.uid)) return;
        const outputDiv = document.getElementById('resultText');
        document.getElementById('outputArea').style.display = 'block';
        outputDiv.innerText = '⏳ Preparando dicas...';
        try {
            const prompt = `Tema: ${text}. Gere 5 perguntas que a plateia pode fazer e 3 termos difíceis com definições simples.`;
            const result = await callOpenRouter(prompt);
            outputDiv.innerText = result;
            currentResult = result;
        } catch(e) {
            outputDiv.innerText = '❌ Erro: ' + e.message;
        }
    }

    function speakResult() {
        if (currentResult) {
            const utterance = new SpeechSynthesisUtterance(currentResult);
            utterance.lang = 'pt-BR';
            speechSynthesis.speak(utterance);
        }
    }
    function copyResult() {
        if (currentResult) {
            navigator.clipboard.writeText(currentResult);
            alert('✅ Copiado!');
        }
    }
    async function sendFeedback() {
        const user = auth.currentUser;
        if (user && currentResult) {
            await db.collection('feedbacks').add({
                userId: user.uid,
                textGerado: currentResult,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('🙏 Feedback enviado!');
        }
    }
    async function rechargeCredits() {
        const code = document.getElementById('rechargeCode').value.trim();
        if (code === 'SYNAP2024') {
            const uid = auth.currentUser.uid;
            let current = await getCredits(uid);
            await setCredits(uid, current + 20);
            alert('🎉 +20 créditos!');
            document.getElementById('rechargeCode').value = '';
        } else alert('❌ Código inválido.');
    }
    function logout() { auth.signOut(); location.reload(); }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            if (!doc.exists) await userRef.set({ name: user.displayName, email: user.email, credits: 20 });
            const credits = await getCredits(user.uid);
            document.getElementById('creditsCount').innerText = credits;
            document.getElementById('userName').innerHTML = `👋 ${user.displayName?.split(' ')[0] || 'Estudante'}`;
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            document.getElementById('loginArea').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    document.getElementById('googleLoginBtn').onclick = () => auth.signInWithPopup(provider);
    document.getElementById('summarizeBtn').onclick = handleSummarize;
    document.getElementById('presentationBtn').onclick = handlePresentation;
    document.getElementById('speakBtn').onclick = speakResult;
    document.getElementById('copyBtn').onclick = copyResult;
    document.getElementById('feedbackBtn').onclick = sendFeedback;
    document.getElementById('rechargeBtn').onclick = rechargeCredits;
    document.getElementById('logoutBtn').onclick = logout;
</script>
</body>
</html>
